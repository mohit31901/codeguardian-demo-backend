name: PR Test Coverage

# 1. THE TRIGGER
# This tells GitHub to run this workflow whenever a Pull Request is opened or updated.
on:
  pull_request:
    branches: [ "main" ]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Download the developer's code onto the GitHub server
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Install Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install the project's dependencies plus the testing tools
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-cov

      # Step 4: Run the test suite and output a JSON coverage report
      # The `--cov-report=json` flag generates the coverage.json file
      - name: Run Pytest Coverage
        run: |
          pytest --cov=. --cov-report=json

      # Step 5: Upload the coverage.json file so our AI Agent can download it later
      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data
          path: coverage.json
          retention-days: 1 # We only need it temporarily for the AI review


          
